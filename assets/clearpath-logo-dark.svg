<svg xmlns="http://www.w3.org/2000/svg" width="1210" height="255" viewBox="85 150 1210 255" role="img" aria-labelledby="title desc">
  <title id="title">ClearPath Technology Partners Primary Horizontal Logo Dark</title>
  <desc id="desc">Primary horizontal ClearPath Technology Partners logo with electric blue cloud path mark on a dark background.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F8CFF"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.08  0 0 0 0 0.32  0 0 0 0 1  0 0 0 .35 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="600" fill="#05070A"/>
  <g transform="translate(95 116) scale(.62)" filter="url(#softGlow)">
